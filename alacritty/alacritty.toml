[shell]
program = "/bin/bash"
args = ["-l", "-c", "tmux a -t 0 || tmux"]

[window]
dimensions = { columns = 90, lines = 28 }
padding = { x = 1, y = 1 }
opacity = 0.85

[cursor]
style = "Beam"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 12.0

[font.bold]
family = "monospace"
style = "Bold"

[font.bold_italic]
family = "monospace"
style = "Bold Italic"

[font.italic]
family = "monospace"
style = "Italic"

[font.normal]
family = "monospace"
style = "Regular"

[keyboard]
bindings = [
   { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" }
]

[[hints.enabled]]
regex = "[^ ]+\\.rs:\\d+:\\d+"
command = { program = "code", args = [ "--goto" ] }
mouse = { enabled = true }

